  short_description: "Безопасный черновик обращения без автоотправки"
  default_prompt: "Используй $lidfly-support-escalation, чтобы безопасно диагностировать проблему MCP и подготовить обращение после согласия пользователя."

dependencies:
  tools:
    - type: "mcp"
      value: "lidfly"
      description: "LidFly MCP v3 support tools"
      transport: "streamable_http"
      url: "https://lidfly.ru/mcp/v3"
