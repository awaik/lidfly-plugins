name: Installer Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      version:
        description: Existing clean tag version, without v
        required: true
        type: string

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    outputs:
      commit: ${{ steps.release.outputs.commit }}
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
      plugin_bundle_sha256: ${{ steps.bundle.outputs.sha256 }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', inputs.version) || github.ref }}

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - id: release
        name: Resolve and validate the clean tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
            TAG="v$VERSION"
          else
            TAG="$GITHUB_REF_NAME"
            VERSION="${TAG#v}"
          fi
          [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]
          test "$(git describe --tags --exact-match)" = "$TAG"
          test -z "$(git status --porcelain)"
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          git merge-base --is-ancestor HEAD refs/remotes/origin/main
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: installer/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: installer/src-tauri -> target

      - name: Validate source and build the plugin bundle once
        working-directory: installer
        run: |
          npm ci
          npm run check
          npm test
          test "$(node -p "require('./package.json').version")" = "${{ steps.release.outputs.version }}"
          git diff --exit-code
          git diff --cached --exit-code
          UNTRACKED=$(git ls-files --full-name --others --exclude-standard)
          if [[ -n "$UNTRACKED" ]]; then
            printf '%s\n' "$UNTRACKED"
            test "$UNTRACKED" = "installer/src-tauri/gen/schemas/linux-schema.json"
            cmp src-tauri/gen/schemas/desktop-schema.json src-tauri/gen/schemas/linux-schema.json
          fi

      - id: bundle
        name: Record the plugin bundle hash
        working-directory: installer
        run: |
          HASH=$(node -p "require('./src-tauri/resources/plugin-bundle-files.json').plugin_bundle_sha256")
          echo "sha256=$HASH" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v7
        with:
          name: plugin-bundle-${{ steps.release.outputs.version }}
          path: |
            installer/src-tauri/resources/plugin-bundle
            installer/src-tauri/resources/plugin-bundle-files.json
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 14

  macos:
    needs: prepare
    runs-on: macos-14
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.commit }}

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: installer/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: installer/src-tauri -> target

      - name: Install exact dependencies
        working-directory: installer
        run: npm ci

      - uses: actions/download-artifact@v8
        with:
          name: plugin-bundle-${{ needs.prepare.outputs.version }}
          path: installer/src-tauri/resources

      - name: Verify the shared plugin bundle
        working-directory: installer
        run: |
          npm run bundle:plugin:verify
          test "$(node -p "require('./src-tauri/resources/plugin-bundle-files.json').plugin_bundle_sha256")" = "${{ needs.prepare.outputs.plugin_bundle_sha256 }}"

      - name: Require macOS release credentials
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_UPDATER_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_UPDATER_PRIVATE_KEY_PASSWORD }}
          TAURI_UPDATER_PUBLIC_KEY: ${{ vars.TAURI_UPDATER_PUBLIC_KEY }}
        run: |
          for name in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID TAURI_SIGNING_PRIVATE_KEY TAURI_SIGNING_PRIVATE_KEY_PASSWORD TAURI_UPDATER_PUBLIC_KEY; do
            test -n "${!name}" || { echo "Missing release credential: $name" >&2; exit 1; }
          done

      - name: Import Developer ID certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/lidfly-developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/lidfly-signing.keychain-db"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "temporary" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "temporary" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "temporary" "$KEYCHAIN_PATH"
          [[ "$APPLE_SIGNING_IDENTITY" =~ ^[A-Fa-f0-9]{40}$ ]]
          IDENTITY_UPPER=$(printf '%s' "$APPLE_SIGNING_IDENTITY" | tr '[:lower:]' '[:upper:]')
          security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep -F "$IDENTITY_UPPER"

      - name: Create release-only Tauri config
        working-directory: installer
        env:
          TAURI_UPDATER_PUBLIC_KEY: ${{ vars.TAURI_UPDATER_PUBLIC_KEY }}
        run: node ../scripts/write-release-tauri-config.mjs "$RUNNER_TEMP/tauri-release.json"

      - name: Build, sign and notarize universal macOS artifacts
        working-directory: installer
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_UPDATER_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_UPDATER_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build --bundles app,dmg --target universal-apple-darwin --config "$RUNNER_TEMP/tauri-release.json"

      - name: Normalize exact artifact names
        working-directory: installer
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          BUNDLE="src-tauri/target/universal-apple-darwin/release/bundle"
          OUT="$RUNNER_TEMP/macos-artifacts"
          mkdir -p "$OUT"
          cp "$BUNDLE/dmg/LidFly Codex Plugin Installer_${VERSION}_universal.dmg" "$OUT/LidFly Codex Plugin Installer_${VERSION}_universal.dmg"
          cp "$BUNDLE/macos/LidFly Codex Plugin Installer.app.tar.gz" "$OUT/LidFly Codex Plugin Installer_${VERSION}_universal.app.tar.gz"
          cp "$BUNDLE/macos/LidFly Codex Plugin Installer.app.tar.gz.sig" "$OUT/LidFly Codex Plugin Installer_${VERSION}_universal.app.tar.gz.sig"

      - name: Verify Developer ID, Gatekeeper, notarization, stapling and both architectures
        working-directory: installer
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          BUNDLE="src-tauri/target/universal-apple-darwin/release/bundle"
          APP="$BUNDLE/macos/LidFly Codex Plugin Installer.app"
          DMG="$RUNNER_TEMP/macos-artifacts/LidFly Codex Plugin Installer_${VERSION}_universal.dmg"
          codesign --verify --deep --strict --verbose=2 "$APP"
          codesign --verify --strict --verbose=2 "$DMG"
          SIGNING_DETAILS=$(codesign -dv --verbose=4 "$APP" 2>&1)
          grep -F "Authority=Developer ID Application:" <<<"$SIGNING_DETAILS"
          grep -F "TeamIdentifier=$APPLE_TEAM_ID" <<<"$SIGNING_DETAILS"
          grep -F "Runtime Version" <<<"$SIGNING_DETAILS"
          CERTIFICATE_PREFIX="$RUNNER_TEMP/lidfly-app-signing-cert-"
          codesign -d --extract-certificates="$CERTIFICATE_PREFIX" "$APP"
          ACTUAL_IDENTITY=$(openssl x509 -inform DER -in "${CERTIFICATE_PREFIX}0" -noout -fingerprint -sha1 | cut -d= -f2 | tr -d ':')
          EXPECTED_IDENTITY=$(printf '%s' "$APPLE_SIGNING_IDENTITY" | tr '[:lower:]' '[:upper:]')
          test "$ACTUAL_IDENTITY" = "$EXPECTED_IDENTITY"
          spctl --assess --type execute --verbose=4 "$APP"
          xcrun stapler validate "$DMG"
          ARCHS=$(lipo -archs "$APP/Contents/MacOS/lidfly-codex-plugin-installer")
          [[ "$ARCHS" == *x86_64* && "$ARCHS" == *arm64* ]]
          EXTRACTED="$RUNNER_TEMP/updater-app"
          mkdir -p "$EXTRACTED"
          tar -xzf "$RUNNER_TEMP/macos-artifacts/LidFly Codex Plugin Installer_${VERSION}_universal.app.tar.gz" -C "$EXTRACTED"
          codesign --verify --deep --strict --verbose=2 "$EXTRACTED/LidFly Codex Plugin Installer.app"
          spctl --assess --type execute --verbose=4 "$EXTRACTED/LidFly Codex Plugin Installer.app"
          EXTRACTED_ARCHS=$(lipo -archs "$EXTRACTED/LidFly Codex Plugin Installer.app/Contents/MacOS/lidfly-codex-plugin-installer")
          [[ "$EXTRACTED_ARCHS" == *x86_64* && "$EXTRACTED_ARCHS" == *arm64* ]]
          MOUNT_POINT="$RUNNER_TEMP/lidfly-dmg-mount"
          mkdir -p "$MOUNT_POINT"
          printf 'Y\n' | hdiutil attach -readonly -noautoopen -nobrowse -mountpoint "$MOUNT_POINT" "$DMG" >/dev/null
          trap 'hdiutil detach "$MOUNT_POINT" >/dev/null' EXIT
          codesign --verify --deep --strict --verbose=2 "$MOUNT_POINT/LidFly Codex Plugin Installer.app"
          spctl --assess --type execute --verbose=4 "$MOUNT_POINT/LidFly Codex Plugin Installer.app"
          DMG_ARCHS=$(lipo -archs "$MOUNT_POINT/LidFly Codex Plugin Installer.app/Contents/MacOS/lidfly-codex-plugin-installer")
          [[ "$DMG_ARCHS" == *x86_64* && "$DMG_ARCHS" == *arm64* ]]
          hdiutil detach "$MOUNT_POINT"
          trap - EXIT

      - name: Verify updater signature on final macOS payload
        working-directory: installer
        env:
          TAURI_UPDATER_PUBLIC_KEY: ${{ vars.TAURI_UPDATER_PUBLIC_KEY }}
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          cargo run --quiet --manifest-path src-tauri/Cargo.toml --example verify-updater-signature -- \
            "$RUNNER_TEMP/macos-artifacts/LidFly Codex Plugin Installer_${VERSION}_universal.app.tar.gz" \
            "$RUNNER_TEMP/macos-artifacts/LidFly Codex Plugin Installer_${VERSION}_universal.app.tar.gz.sig"

      - name: Record Apple signing evidence
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          export APP="src-tauri/target/universal-apple-darwin/release/bundle/macos/LidFly Codex Plugin Installer.app"
          export DMG="$RUNNER_TEMP/macos-artifacts/LidFly Codex Plugin Installer_${VERSION}_universal.dmg"
          export UPDATER="$RUNNER_TEMP/macos-artifacts/LidFly Codex Plugin Installer_${VERSION}_universal.app.tar.gz"
          CERTIFICATE_PREFIX="$RUNNER_TEMP/lidfly-evidence-signing-cert-"
          codesign -d --extract-certificates="$CERTIFICATE_PREFIX" "$APP"
          export SIGNING_IDENTITY_SHA1=$(openssl x509 -inform DER -in "${CERTIFICATE_PREFIX}0" -noout -fingerprint -sha1 | cut -d= -f2 | tr -d ':' | tr '[:upper:]' '[:lower:]')
          export SIGNING_TEAM_ID=$(codesign -dv --verbose=4 "$APP" 2>&1 | sed -n 's/^TeamIdentifier=//p')
          node - <<'NODE'
          const fs = require('fs'); const crypto = require('crypto');
          const sha = p => crypto.createHash('sha256').update(fs.readFileSync(p)).digest('hex');
          fs.writeFileSync(`${process.env.RUNNER_TEMP}/macos-artifacts/apple-evidence.json`, JSON.stringify({
            schema_version: 1, release_version: process.env.VERSION,
            apple: { developer_id: true, hardened_runtime: true, notarized: true, stapled: true,
              gatekeeper_accepted: true, team_id: process.env.SIGNING_TEAM_ID,
              signing_identity_sha1: process.env.SIGNING_IDENTITY_SHA1,
              architectures: ['x86_64', 'arm64'],
              dmg_sha256: sha(process.env.DMG), updater_sha256: sha(process.env.UPDATER) }
          }, null, 2) + '\n');
          NODE

      - uses: actions/upload-artifact@v7
        with:
          name: macos-${{ needs.prepare.outputs.version }}
          path: ${{ runner.temp }}/macos-artifacts
          if-no-files-found: error
          retention-days: 14

  windows:
    needs: prepare
    runs-on: windows-2022
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.commit }}

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: installer/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: installer/src-tauri -> target

      - name: Install exact dependencies
        working-directory: installer
        run: npm ci

      - uses: actions/download-artifact@v8
        with:
          name: plugin-bundle-${{ needs.prepare.outputs.version }}
          path: installer/src-tauri/resources

      - name: Verify the shared plugin bundle
        working-directory: installer
        shell: bash
        run: |
          npm run bundle:plugin:verify
          test "$(node -p "require('./src-tauri/resources/plugin-bundle-files.json').plugin_bundle_sha256")" = "${{ needs.prepare.outputs.plugin_bundle_sha256 }}"

      - name: Require Windows updater-signing credentials
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_UPDATER_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_UPDATER_PRIVATE_KEY_PASSWORD }}
          TAURI_UPDATER_PUBLIC_KEY: ${{ vars.TAURI_UPDATER_PUBLIC_KEY }}
        run: |
          @('TAURI_SIGNING_PRIVATE_KEY','TAURI_SIGNING_PRIVATE_KEY_PASSWORD','TAURI_UPDATER_PUBLIC_KEY') | ForEach-Object {
            if ([string]::IsNullOrWhiteSpace((Get-Item "Env:$_").Value)) { throw "Missing release credential: $_" }
          }

      - name: Create release-only Tauri config
        working-directory: installer
        env:
          TAURI_UPDATER_PUBLIC_KEY: ${{ vars.TAURI_UPDATER_PUBLIC_KEY }}
        run: node ../scripts/write-release-tauri-config.mjs "$env:RUNNER_TEMP/tauri-release.json"

      - name: Build updater-signed Windows x64 installer
        working-directory: installer
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_UPDATER_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_UPDATER_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build --bundles nsis --target x86_64-pc-windows-msvc --config "$env:RUNNER_TEMP/tauri-release.json"

      - name: Normalize names and verify the Glas-style Windows policy
        working-directory: installer
        shell: pwsh
        run: |
          $version = '${{ needs.prepare.outputs.version }}'
          $source = "src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/LidFly Codex Plugin Installer_${version}_x64-setup.exe"
          $application = 'src-tauri/target/x86_64-pc-windows-msvc/release/lidfly-codex-plugin-installer.exe'
          $out = Join-Path $env:RUNNER_TEMP 'windows-artifacts'
          New-Item -ItemType Directory -Force -Path $out | Out-Null
          $installer = Join-Path $out "LidFly Codex Plugin Installer_${version}_x64-setup.exe"
          Copy-Item $source $installer
          Copy-Item "$source.sig" "$installer.sig"
          node ../scripts/verify-pe-machine.mjs $application
          $signature = Get-AuthenticodeSignature $installer
          if ($signature.Status -ne 'NotSigned') { throw "Glas-style Windows release must not contain Authenticode: $($signature.Status)" }

      - name: Verify updater signature on final Windows installer
        working-directory: installer
        env:
          TAURI_UPDATER_PUBLIC_KEY: ${{ vars.TAURI_UPDATER_PUBLIC_KEY }}
        run: |
          cargo run --quiet --manifest-path src-tauri/Cargo.toml --example verify-updater-signature -- `
            "$env:RUNNER_TEMP/windows-artifacts/LidFly Codex Plugin Installer_${{ needs.prepare.outputs.version }}_x64-setup.exe" `
            "$env:RUNNER_TEMP/windows-artifacts/LidFly Codex Plugin Installer_${{ needs.prepare.outputs.version }}_x64-setup.exe.sig"

      - name: Record Windows signing evidence
        shell: pwsh
        run: |
          $version = '${{ needs.prepare.outputs.version }}'
          $installer = "$env:RUNNER_TEMP/windows-artifacts/LidFly Codex Plugin Installer_${version}_x64-setup.exe"
          $signature = Get-AuthenticodeSignature $installer
          if ($signature.Status -ne 'NotSigned') { throw "Glas-style Windows release must not contain Authenticode: $($signature.Status)" }
          $evidence = @{
            schema_version = 1; release_version = $version;
            windows = @{
              authenticode_status = 'NotSigned'; release_policy = 'tauri_updater_signature_only';
              architecture = 'x86_64';
              installer_sha256 = (Get-FileHash -Algorithm SHA256 $installer).Hash.ToLowerInvariant();
              updater_signature_verified = $true
            }
          }
          $evidence | ConvertTo-Json -Depth 5 | Set-Content -Encoding utf8 "$env:RUNNER_TEMP/windows-artifacts/windows-evidence.json"

      - uses: actions/upload-artifact@v7
        with:
          name: windows-${{ needs.prepare.outputs.version }}
          path: ${{ runner.temp }}/windows-artifacts
          if-no-files-found: error
          retention-days: 14

  handoff:
    needs: [prepare, macos, windows]
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.commit }}

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: installer/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - name: Install exact dependencies
        working-directory: installer
        run: npm ci

      - uses: actions/download-artifact@v8
        with:
          name: plugin-bundle-${{ needs.prepare.outputs.version }}
          path: release-artifacts

      - uses: actions/download-artifact@v8
        with:
          name: macos-${{ needs.prepare.outputs.version }}
          path: release-artifacts

      - uses: actions/download-artifact@v8
        with:
          name: windows-${{ needs.prepare.outputs.version }}
          path: release-artifacts

      - name: Merge platform evidence
        run: |
          node scripts/merge-signing-evidence.mjs \
            release-artifacts/apple-evidence.json \
            release-artifacts/windows-evidence.json \
            release-artifacts/signing-evidence.json

      - name: Verify exact release artifacts and prepare direct-mcp handoff
        env:
          TAURI_UPDATER_PUBLIC_KEY: ${{ vars.TAURI_UPDATER_PUBLIC_KEY }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        working-directory: installer
        run: |
          npm run release:verify -- \
            --version "${{ needs.prepare.outputs.version }}" \
            --artifacts-dir ../release-artifacts \
            --evidence ../release-artifacts/signing-evidence.json
          npm run release:handoff -- \
            --version "${{ needs.prepare.outputs.version }}" \
            --tag "${{ needs.prepare.outputs.tag }}" \
            --artifacts-dir ../release-artifacts \
            --evidence ../release-artifacts/signing-evidence.json

      - uses: actions/upload-artifact@v7
        with:
          name: lidfly-installer-${{ needs.prepare.outputs.version }}-handoff
          path: |
            release-artifacts/LidFly Codex Plugin Installer_*.dmg
            release-artifacts/LidFly Codex Plugin Installer_*.app.tar.gz
            release-artifacts/LidFly Codex Plugin Installer_*.app.tar.gz.sig
            release-artifacts/LidFly Codex Plugin Installer_*.exe
            release-artifacts/LidFly Codex Plugin Installer_*.exe.sig
            release-artifacts/SHA256SUMS.txt
            release-artifacts/plugin-bundle-files.json
            release-artifacts/release-handoff.json
          if-no-files-found: error
          retention-days: 30
